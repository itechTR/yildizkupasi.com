name: Update live football data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: live-football-data
  cancel-in-progress: false

jobs:
  update-live-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update World Cup data
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-live-data.mjs

      - name: Generate intelligence files
        run: node scripts/generate-intelligence.mjs

      - name: Commit updated data
        run: |
          git config user.name "yildizkupasi-bot"
          git config user.email "actions@github.com"

          git pull --rebase origin main

          git add data/*.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update live football data and intelligence"
            git push origin main
          fi